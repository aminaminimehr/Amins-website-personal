  # projects
  projects:
    enable: true
    # title: "Custom Name"
    items:
      - title: Traffic Flow Prediction - LSTM Encoder Decoder.
        content:  Developed an encoder–decoder architecture based on Long Short-Term Memory (LSTM) networks to forecast short-term traffic flow across three major metropolitan highways in Tehran. The model leverages sequential time-series data to capture complex temporal dependencies and generate multi-step ahead predictions, supporting more efficient traffic management and congestion analysis. 
        image: /images/project_encoder_decoder_traffic/Fitplot_test_sequence_10.jpg
        badges:
          - "LSTM "
          - "Encoder-Decoder"
          - "Python"


      - title: Drone video object detection - YOLO 8.
        content: Applied the YOLOv8 framework to drone-captured video data to detect and count vehicles in large-scale parking lots. The system processes aerial footage in real time, leveraging deep learning-based object detection to accurately localize and track cars across frames, enabling scalable parking utilization analysis and monitoring.
        image: /images/project_object_detection_drone_videos/Object_detection_YOLO8.jpg
        featured:
          name: Demo
          link: https://www.linkedin.com/posts/sobhan-ebrahimi-67b99a248_innovation-smartcities-ai-ugcPost-7154767881015111680-MkL4?utm_source=share&utm_medium=member_desktop&rcm=ACoAAFHIRhoBf4dtzHtbCiDcSxwgWTXInDPilF4
        badges:
